<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Tracker</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 100px;
        }
        h1 { text-align: center; margin: 16px 0; font-size: 24px; }
        h2 { font-size: 18px; margin: 20px 0 12px; }

        .top-buttons { display: flex; gap: 8px; margin-bottom: 8px; }
        .scan-btn, .tasting-btn {
            flex: 1;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
        }
        .scan-btn { background: #8B5E3C; }
        .scan-btn:active { background: #6d4a2f; }
        .scan-btn:disabled { background: #555; cursor: wait; }
        .tasting-btn { background: #2e7d32; }
        .tasting-btn:active { background: #1b5e20; }

        #camera-input { display: none; }

        .card {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
        }

        .field { margin: 8px 0; }
        .field label {
            display: block;
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .field input, .field textarea {
            width: 100%;
            padding: 8px;
            background: #333;
            border: 1px solid #444;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 16px;
            font-family: inherit;
        }
        .field textarea { resize: vertical; min-height: 60px; }

        .rating { display: flex; gap: 8px; margin: 8px 0; }
        .rating button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #555;
            background: #333;
            color: #e0e0e0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .rating button.active {
            border-color: #8B5E3C;
            background: #8B5E3C;
            color: white;
        }

        .actions { display: flex; gap: 8px; margin-top: 12px; }
        .actions button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-save { background: #2e7d32; color: white; }
        .btn-cancel { background: #444; color: #ccc; }

        .coffee-item {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0;
        }
        .coffee-item .roastery { font-size: 12px; color: #999; text-transform: uppercase; }
        .coffee-item .name { font-size: 18px; font-weight: 600; margin: 2px 0; }
        .coffee-item .origin { color: #aaa; font-size: 14px; }
        .tasting-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .tasting-tag {
            display: inline-block;
            background: #3a2a1a;
            color: #d4a574;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #5a3a1a;
        }
        .tasting-tag:hover { background: #4a3a2a; }
        .filter-bar {
            background: #3a2a1a;
            border: 1px solid #5a3a1a;
            border-radius: 8px;
            padding: 8px 12px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #d4a574;
            font-size: 14px;
        }
        .filter-bar button {
            background: none;
            border: none;
            color: #e57373;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }
        .coffee-item .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 13px;
            color: #777;
        }
        .coffee-item .rating-display { color: #8B5E3C; font-weight: 600; }
        .coffee-item .delete-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 13px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #555;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty { text-align: center; color: #666; padding: 40px 0; }

        #review-form { display: none; }
        #review-form.active { display: block; }

        .autocomplete-wrapper { position: relative; }
        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #333;
            border: 1px solid #555;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }
        .autocomplete-item {
            padding: 8px 10px;
            cursor: pointer;
            font-size: 15px;
        }
        .autocomplete-item:hover, .autocomplete-item.highlighted {
            background: #444;
        }



        .coffee-item { cursor: pointer; }
        .coffee-item:active { opacity: 0.8; }

        /* Detail panel overlay */
        #detail-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a1a1a;
            z-index: 100;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 100px;
            max-width: 500px;
            margin: 0 auto;
        }
        #detail-panel.active { display: block; animation: slide-up 0.2s ease; }
        @keyframes slide-up {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .detail-header h2 { margin: 0; }
        .close-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
        }
        .btn-rescan {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            background: #333;
            color: #e0e0e0;
            border: 2px dashed #555;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-rescan:disabled { opacity: 0.5; cursor: wait; }

        /* Tasting modal */
        #tasting-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #tasting-modal.active { display: flex; }
        .tasting-modal-content {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 460px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .tasting-modal-content h2 { margin-bottom: 12px; }
        .brew-type-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .brew-type-buttons button {
            flex: 1 1 calc(50% - 4px);
            min-width: 0;
            padding: 10px 6px;
            font-size: 13px;
            font-weight: 600;
            border: 2px solid #555;
            border-radius: 10px;
            background: #333;
            color: #e0e0e0;
            cursor: pointer;
        }
        .brew-type-buttons button.active {
            border-color: #8B5E3C;
            background: #8B5E3C;
            color: white;
        }

        /* Tasting history */
        .tasting-toggle {
            background: none;
            border: none;
            color: #8B5E3C;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 0;
            margin-top: 6px;
        }
        .tasting-history { margin-top: 8px; }
        .tasting-entry {
            background: #222;
            border-radius: 8px;
            padding: 8px 10px;
            margin: 4px 0;
            font-size: 13px;
        }
        .tasting-entry .te-header {
            display: flex;
            justify-content: space-between;
            color: #aaa;
        }
        .tasting-entry .te-score { color: #8B5E3C; font-weight: 600; }
        .tasting-entry .te-comments { color: #999; font-style: italic; margin-top: 2px; }

        /* Recent tastings section */
        .recent-tasting-card {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 10px 12px;
            margin: 6px 0;
        }
        .recent-tasting-card .rt-coffee {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .recent-tasting-card .rt-details {
            font-size: 14px;
            color: #ccc;
            margin-top: 2px;
        }
        .recent-tasting-card .rt-score { color: #8B5E3C; font-weight: 600; }
        .recent-tasting-card .rt-date { font-size: 12px; color: #666; margin-top: 2px; }

        /* Roastery grid */
        .roastery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }
        .roastery-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 14px 10px;
            font-size: 15px;
            font-weight: 600;
            color: #e0e0e0;
            cursor: pointer;
            text-align: center;
            transition: background 0.15s;
        }
        .roastery-btn:active { background: #3a3a3a; }
        .roastery-btn .roastery-emoji { font-size: 22px; display: block; margin-bottom: 4px; }

        /* Roastery detail view */
        .roastery-detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .roastery-back-btn {
            background: none;
            border: none;
            color: #8B5E3C;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
        }
        .roastery-detail-header h2 { margin: 0; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Coffee Tracker</h1>

    <div class="top-buttons">
        <button class="scan-btn" id="add-coffee-btn">Add Coffee to Database</button>
        <button class="tasting-btn" id="tasting-btn">Conduct Tasting</button>
    </div>

    <div id="review-form" class="card">
        <h2>Review Details</h2>
        <div id="qr-banner" style="display:none;background:#2e5c3e;color:#c8e6c9;padding:8px 10px;border-radius:8px;margin-bottom:8px;font-size:13px">
            Enriched from product page
        </div>
        <div id="dedup-banner" style="display:none;background:#8B5E3C;color:white;padding:10px;border-radius:8px;margin-bottom:12px;font-size:14px">
            A coffee with this name already exists.
        </div>
        <div id="scan-spinner" style="display:none;text-align:center;padding:12px"><span class="spinner"></span> Analyzing your coffee...</div>
        <button class="btn-rescan" id="form-scan-btn" type="button">Scan from Photo</button>
        <input type="file" id="camera-input" accept="image/*" style="display:none">
        <div class="field"><label>Roaster</label><div class="autocomplete-wrapper"><input id="f-roaster"><div class="autocomplete-dropdown" id="f-roaster-dropdown"></div></div></div>
        <div class="field"><label>Coffee Name</label><div style="display:flex;gap:8px;align-items:center"><input id="f-name" style="flex:1"><button id="f-lookup-btn" type="button" style="display:none;padding:8px 14px;font-size:14px;font-weight:600;background:#5a3a1a;color:#d4a574;border:1px solid #7a5a3a;border-radius:8px;cursor:pointer;white-space:nowrap">Lookup</button></div><div id="lookup-source" style="display:none;font-size:12px;color:#a0a0a0;margin-top:4px"></div></div>
        <div class="field"><label>Country Grown</label><input id="f-country_grown"></div>
        <div class="field"><label>Country Roasted</label><input id="f-country_roasted"></div>
        <div class="field"><label>Bean Type</label><input id="f-bean_type" placeholder="e.g. Arabica, Bourbon, Robusta"></div>
        <div class="field"><label>Process</label><input id="f-process"></div>
        <div class="field"><label>Roast Level</label><input id="f-roast_level"></div>
        <div class="field"><label>Tasting Notes</label><input id="f-tasting_notes"></div>
        <div class="field"><label>Weight</label><input id="f-weight"></div>
        <div class="field"><label>Price</label><input id="f-price"></div>
        <div class="field" id="f-other-field" style="display:none"><label>Other (from scan)</label><textarea id="f-other" style="min-height:80px;font-size:13px;color:#aaa" readonly></textarea></div>
        <div class="field"><label>General Comments</label><textarea id="f-comments" placeholder="General comments"></textarea></div>
        <div class="actions" id="normal-actions">
            <button class="btn-cancel" id="cancel-btn">Cancel</button>
            <button class="btn-save" id="save-btn">Save</button>
        </div>
        <div class="actions" id="dedup-actions" style="display:none">
            <button class="btn-cancel" id="dedup-cancel-btn">Cancel</button>
            <button class="btn-save" id="update-existing-btn" style="background:#8B5E3C">Update Existing</button>
            <button class="btn-save" id="save-as-new-btn">Save as New</button>
        </div>
    </div>

    <!-- Detail / Edit panel -->
    <div id="detail-panel">
        <div class="detail-header">
            <h2>Edit Coffee</h2>
            <button class="close-btn" id="detail-close-btn" aria-label="Close">&times;</button>
        </div>
        <div class="field"><label>Roaster</label><div class="autocomplete-wrapper"><input id="d-roaster"><div class="autocomplete-dropdown" id="d-roaster-dropdown"></div></div></div>
        <div class="field"><label>Coffee Name</label><input id="d-name"></div>
        <div class="field"><label>Country Grown</label><input id="d-country_grown"></div>
        <div class="field"><label>Country Roasted</label><input id="d-country_roasted"></div>
        <div class="field"><label>Bean Type</label><input id="d-bean_type" placeholder="e.g. Arabica, Bourbon, Robusta"></div>
        <div class="field"><label>Process</label><input id="d-process"></div>
        <div class="field"><label>Roast Level</label><input id="d-roast_level"></div>
        <div class="field"><label>Tasting Notes</label><input id="d-tasting_notes"></div>
        <div class="field"><label>Weight</label><input id="d-weight"></div>
        <div class="field"><label>Price</label><input id="d-price"></div>
        <div class="field"><label>General Comments</label><textarea id="d-comments" placeholder="General comments"></textarea></div>
        <div class="actions">
            <button class="btn-rescan" id="detail-rescan-btn">Scan another side</button>
        </div>
        <div class="actions" style="margin-top:8px">
            <button class="btn-save" id="detail-save-btn">Save</button>
        </div>
        <div class="actions" style="margin-top:16px">
            <button id="detail-delete-btn" style="width:100%;padding:12px;font-size:15px;font-weight:600;background:#444;color:#e57373;border:1px solid #e57373;border-radius:10px;cursor:pointer">Delete Coffee</button>
        </div>
        <input type="file" id="rescan-input" accept="image/*" style="display:none">
    </div>

    <!-- Tasting modal -->
    <div id="tasting-modal">
        <div class="tasting-modal-content">
            <h2 id="tasting-modal-title">Conduct Tasting</h2>
            <div class="field">
                <label>Coffee</label>
                <select id="t-coffee" style="width:100%;padding:8px;background:#333;border:1px solid #444;border-radius:8px;color:#e0e0e0;font-size:16px">
                    <option value="">Select a coffee...</option>
                </select>
            </div>
            <div class="field">
                <label>Brew Type</label>
                <div class="brew-type-buttons" id="t-brew-type-buttons"></div>
            </div>
            <div class="field">
                <label>Dosage</label>
                <select id="t-dosage" style="width:100%;padding:8px;background:#333;border:1px solid #444;border-radius:8px;color:#e0e0e0;font-size:16px">
                    <option value="">Select dosage...</option>
                </select>
            </div>
            <div class="field">
                <label>Grind Level</label>
                <select id="t-grind-level" style="width:100%;padding:8px;background:#333;border:1px solid #444;border-radius:8px;color:#e0e0e0;font-size:16px">
                    <option value="">Select grind level...</option>
                </select>
            </div>
            <div class="field">
                <label>Score</label>
                <div class="rating" id="t-score-buttons">
                    <button data-val="1">1</button>
                    <button data-val="2">2</button>
                    <button data-val="3">3</button>
                    <button data-val="4">4</button>
                    <button data-val="5">5</button>
                </div>
            </div>
            <div class="field"><label>Tasting Notes</label><input id="t-tasting_notes" placeholder="e.g. Chocolate, Berry, Citrus" style="width:100%;padding:8px;background:#333;border:1px solid #444;border-radius:8px;color:#e0e0e0;font-size:16px"></div>
            <div class="field"><label>General Comments</label><textarea id="t-comments" placeholder="General comments" style="width:100%;padding:8px;background:#333;border:1px solid #444;border-radius:8px;color:#e0e0e0;font-size:16px;font-family:inherit;resize:vertical;min-height:60px"></textarea></div>
            <div class="actions">
                <button class="btn-cancel" id="tasting-cancel-btn">Cancel</button>
                <button class="btn-save" id="tasting-save-btn">Save Tasting</button>
            </div>
        </div>
    </div>

    <div id="home-view">
        <div id="recent-tastings-section"></div>
        <h2>My Roasteries</h2>
        <div id="roastery-grid" class="roastery-grid"><p class="empty">No coffees yet. Add your first coffee!</p></div>
    </div>

    <div id="roastery-detail-view" style="display:none">
        <div class="roastery-detail-header">
            <button class="roastery-back-btn" id="roastery-back-btn">←</button>
            <h2 id="roastery-detail-title"></h2>
        </div>
        <div id="filter-bar" class="filter-bar" style="display:none">
            <span>Filtering by: <strong id="filter-note-name"></strong></span>
            <button id="clear-filter-btn" aria-label="Clear filter">&times;</button>
        </div>
        <div id="roastery-coffee-list"></div>
    </div>

    <script>
        const $ = id => document.getElementById(id);

        // ── Add coffee / scan ─────────────────────────────────────────────────

        function openAddForm() {
            // Clear all fields
            for (const key of ["roaster", "name", "country_grown", "country_roasted", "bean_type", "process", "roast_level", "tasting_notes", "weight", "price"]) {
                $("f-" + key).value = "";
            }
            $("f-other").value = "";
            $("f-comments").value = "";
            // Hide scan-specific UI and lookup button
            $("f-other-field").style.display = "none";
            $("f-lookup-btn").style.display = "none";
            $("lookup-source").style.display = "none";
            $("qr-banner").style.display = "none";
            $("dedup-banner").style.display = "none";
            $("scan-spinner").style.display = "none";
            // Reset dedup state
            dupMatchId = null;
            $("normal-actions").style.display = "flex";
            $("dedup-actions").style.display = "none";
            // Show form
            $("review-form").classList.add("active");
        }

        $("add-coffee-btn").addEventListener("click", openAddForm);

        $("form-scan-btn").addEventListener("click", () => {
            $("camera-input").value = "";
            $("camera-input").click();
        });

        $("camera-input").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const btn = $("form-scan-btn");
            btn.disabled = true;
            btn.textContent = "Scanning...";
            $("scan-spinner").style.display = "block";

            const form = new FormData();
            form.append("image", file);

            try {
                const res = await fetch("/api/scan", { method: "POST", body: form });
                const data = await res.json();
                if (res.ok) {
                    fillForm(data);
                } else {
                    alert("Scan failed: " + (data.error || "Unknown error"));
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Scan from Photo";
                $("scan-spinner").style.display = "none";
                $("camera-input").value = "";
            }
        });

        let dupMatchId = null;
        let dupMatchRoaster = null;
        let dupMatchName = null;

        function fillForm(data) {
            for (const key of ["roaster", "name", "country_grown", "country_roasted", "bean_type", "process", "roast_level", "tasting_notes", "weight", "price"]) {
                const el = $("f-" + key);
                if (el) el.value = data[key] || "";
            }
            $("f-other").value = data.other || "";
            $("f-other-field").style.display = data.other ? "block" : "none";
            $("f-comments").value = "";

            // Show QR enrichment note
            $("qr-banner").style.display = data.qr_url ? "block" : "none";

            // Check for duplicate
            const scannedRoaster = (data.roaster || "").trim().toLowerCase();
            const scannedName = (data.name || "").trim().toLowerCase();
            const match = coffeeCache.find(c =>
                (c.roaster || "").trim().toLowerCase() === scannedRoaster &&
                (c.name || "").trim().toLowerCase() === scannedName &&
                scannedRoaster && scannedName
            );
            if (match) {
                dupMatchId = match.id;
                dupMatchRoaster = (match.roaster || "").trim().toLowerCase();
                dupMatchName = (match.name || "").trim().toLowerCase();
                $("dedup-banner").style.display = "block";
                $("normal-actions").style.display = "none";
                $("dedup-actions").style.display = "flex";
            } else {
                dupMatchId = null;
                $("dedup-banner").style.display = "none";
                $("normal-actions").style.display = "flex";
                $("dedup-actions").style.display = "none";
            }

            $("review-form").classList.add("active");
            // Check lookup availability for the filled roaster
            checkLookupAvailable();
        }

        function getFormCoffee() {
            return {
                roaster: $("f-roaster").value,
                name: $("f-name").value,
                country_grown: $("f-country_grown").value,
                country_roasted: $("f-country_roasted").value,
                bean_type: $("f-bean_type").value,
                process: $("f-process").value,
                roast_level: $("f-roast_level").value,
                tasting_notes: $("f-tasting_notes").value,
                weight: $("f-weight").value,
                price: $("f-price").value,
                comments: $("f-comments").value,
            };
        }

        function closeReviewForm() {
            $("review-form").classList.remove("active");
            $("f-other-field").style.display = "none";
        }

        $("cancel-btn").addEventListener("click", closeReviewForm);
        $("dedup-cancel-btn").addEventListener("click", closeReviewForm);

        $("save-btn").addEventListener("click", async () => {
            // Check for duplicate before saving
            const formRoaster = $("f-roaster").value.trim().toLowerCase();
            const formName = $("f-name").value.trim().toLowerCase();
            if (formRoaster && formName) {
                const match = coffeeCache.find(c =>
                    (c.roaster || "").trim().toLowerCase() === formRoaster &&
                    (c.name || "").trim().toLowerCase() === formName
                );
                if (match) {
                    dupMatchId = match.id;
                    dupMatchRoaster = formRoaster;
                    dupMatchName = formName;
                    $("dedup-banner").style.display = "block";
                    $("normal-actions").style.display = "none";
                    $("dedup-actions").style.display = "flex";
                    return;
                }
            }
            await fetch("/api/coffees", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(getFormCoffee()),
            });
            closeReviewForm();
            loadHomeScreen();
        });

        $("update-existing-btn").addEventListener("click", async () => {
            const coffee = getFormCoffee();
            coffee.created_at = "";
            const res = await fetch("/api/coffees/" + dupMatchId, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(coffee),
            });
            if (res.ok) {
                closeReviewForm();
                loadHomeScreen();
            } else {
                alert("Update failed");
            }
        });

        $("save-as-new-btn").addEventListener("click", async () => {
            const currentRoaster = $("f-roaster").value.trim().toLowerCase();
            const currentName = $("f-name").value.trim().toLowerCase();
            if (currentRoaster === dupMatchRoaster && currentName === dupMatchName) {
                alert("Please change the name or roaster to make this coffee unique before saving as new.");
                return;
            }
            await fetch("/api/coffees", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(getFormCoffee()),
            });
            closeReviewForm();
            loadHomeScreen();
        });

        // ── Detail panel ──────────────────────────────────────────────────────

        let detailCoffeeId = null;
        const DETAIL_TEXT_FIELDS = ["roaster", "name", "country_grown", "country_roasted",
                                    "bean_type", "process", "roast_level", "tasting_notes", "weight", "price", "comments"];

        function detailSnapshot() {
            const snap = {};
            for (const key of DETAIL_TEXT_FIELDS) snap[key] = $("d-" + key).value;
            return JSON.stringify(snap);
        }

        let detailOriginalSnapshot = null;

        function openDetail(coffee) {
            detailCoffeeId = coffee.id;
            for (const key of DETAIL_TEXT_FIELDS) {
                $("d-" + key).value = coffee[key] || "";
            }
            detailOriginalSnapshot = detailSnapshot();
            $("detail-panel").classList.add("active");
            $("detail-panel").scrollTop = 0;
        }

        function closeDetail() {
            if (detailSnapshot() !== detailOriginalSnapshot) {
                if (!confirm("Discard unsaved changes?")) return;
            }
            $("detail-panel").classList.remove("active");
            detailCoffeeId = null;
        }

        $("detail-close-btn").addEventListener("click", closeDetail);

        $("detail-save-btn").addEventListener("click", async () => {
            const coffee = { created_at: "" };
            for (const key of DETAIL_TEXT_FIELDS) coffee[key] = $("d-" + key).value;

            const res = await fetch("/api/coffees/" + detailCoffeeId, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(coffee),
            });
            if (res.ok) {
                $("detail-panel").classList.remove("active");
                detailCoffeeId = null;
                loadHomeScreen();
            } else {
                alert("Save failed");
            }
        });

        $("detail-delete-btn").addEventListener("click", async () => {
            if (!confirm("Delete this coffee and all its tastings?")) return;
            await fetch("/api/coffees/" + detailCoffeeId, { method: "DELETE" });
            $("detail-panel").classList.remove("active");
            detailCoffeeId = null;
            if (currentRoastery) {
                openRoastery(currentRoastery);
            } else {
                loadHomeScreen();
            }
        });

        // ── Rescan ────────────────────────────────────────────────────────────

        $("detail-rescan-btn").addEventListener("click", () => {
            $("rescan-input").value = "";
            $("rescan-input").click();
        });

        $("rescan-input").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const btn = $("detail-rescan-btn");
            btn.disabled = true;
            btn.textContent = "Scanning…";

            const form = new FormData();
            form.append("image", file);

            try {
                const res = await fetch("/api/scan", { method: "POST", body: form });
                const data = await res.json();
                if (!res.ok) { alert("Scan failed: " + (data.error || "Unknown error")); return; }

                // Merge: fill only empty fields
                for (const key of DETAIL_TEXT_FIELDS) {
                    if (data[key] && !$("d-" + key).value) {
                        $("d-" + key).value = data[key];
                    }
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Scan another side";
                $("rescan-input").value = "";
            }
        });

        // ── List & Home Screen ───────────────────────────────────────────────

        async function deleteCoffee(id) {
            if (!confirm("Delete this coffee and all its tastings?")) return;
            await fetch("/api/coffees/" + id, { method: "DELETE" });
            if (currentRoastery) {
                openRoastery(currentRoastery);
            } else {
                loadHomeScreen();
            }
        }

        function renderAvgScore(c) {
            if (c.average_score == null) return '<span class="rating-display">&ndash;</span>';
            return `<span class="rating-display">${c.average_score} ★</span>`;
        }

        let coffeeCache = [];
        let activeNoteFilter = null;
        let currentRoastery = null;

        function filterByNote(note) {
            activeNoteFilter = note;
            $("filter-note-name").textContent = note;
            $("filter-bar").style.display = "flex";
            if (currentRoastery) {
                openRoastery(currentRoastery);
            }
        }

        $("clear-filter-btn").addEventListener("click", () => {
            activeNoteFilter = null;
            $("filter-bar").style.display = "none";
            if (currentRoastery) {
                openRoastery(currentRoastery);
            }
        });

        async function loadHomeScreen() {
            // Fetch recent tastings and roasters in parallel
            const [recentRes, roastersRes, coffeesRes] = await Promise.all([
                fetch("/api/tastings/recent?limit=2"),
                fetch("/api/roasters"),
                fetch("/api/coffees"),
            ]);
            const recentTastings = await recentRes.json();
            const roasters = await roastersRes.json();
            coffeeCache = await coffeesRes.json();

            // Show home view, hide roastery detail
            $("home-view").style.display = "block";
            $("roastery-detail-view").style.display = "none";
            currentRoastery = null;

            // Render recent tastings
            const rtSection = $("recent-tastings-section");
            if (recentTastings.length > 0) {
                rtSection.innerHTML = `<h2>Recent Tastings</h2>` + recentTastings.map(t => `
                    <div class="recent-tasting-card">
                        <div class="rt-coffee">${esc(t.coffee_roaster || "Unknown")} — ${esc(t.coffee_name || "Unknown")}</div>
                        <div class="rt-details">
                            ${brewTypeDisplay(t.brew_type)}${t.dosage != null ? " · " + t.dosage.toFixed(1) + "gr" : ""}${t.grind_level != null ? " · grind " + t.grind_level.toFixed(1) : ""}
                        </div>
                        ${t.score != null ? `<div class="rt-score">${"★".repeat(t.score)}${"☆".repeat(5 - t.score)}</div>` : ""}
                        ${t.tasting_notes ? `<div class="tasting-tags" style="margin-top:2px">${t.tasting_notes.split(",").map(n => n.trim()).filter(Boolean).map(n => `<span class="tasting-tag">${esc(n)}</span>`).join("")}</div>` : ""}
                        <div class="rt-date">${new Date(t.created_at).toLocaleDateString()}</div>
                    </div>
                `).join("");
            } else {
                rtSection.innerHTML = "";
            }

            // Render roastery grid
            const grid = $("roastery-grid");
            if (roasters.length === 0) {
                grid.innerHTML = '<p class="empty">No coffees yet. Add your first coffee!</p>';
            } else {
                grid.innerHTML = roasters.map(r => `
                    <button class="roastery-btn" data-roaster="${esc(r.roaster)}">
                        <span class="roastery-emoji">${r.emoji || "☕"}</span>
                        ${esc(r.roaster)}
                    </button>
                `).join("");
                grid.querySelectorAll(".roastery-btn").forEach(btn => {
                    btn.addEventListener("click", () => openRoastery(btn.dataset.roaster));
                });
            }
        }

        async function openRoastery(roasterName) {
            currentRoastery = roasterName;
            $("home-view").style.display = "none";
            $("roastery-detail-view").style.display = "block";

            // Find roaster emoji from cache or use fallback
            const roasterEmoji = roasterCache.find(r => r.roaster === roasterName)?.emoji || "☕";
            $("roastery-detail-title").textContent = roasterEmoji + " " + roasterName;

            // Fetch coffees for this roaster
            const url = activeNoteFilter
                ? "/api/coffees?note=" + encodeURIComponent(activeNoteFilter)
                : "/api/coffees";
            const res = await fetch(url);
            const allCoffees = await res.json();
            coffeeCache = allCoffees;
            const roasteryCoffees = allCoffees.filter(c =>
                (c.roaster || "").toLowerCase() === roasterName.toLowerCase()
            );

            const list = $("roastery-coffee-list");
            if (roasteryCoffees.length === 0) {
                list.innerHTML = '<p class="empty">No coffees match.</p>';
                return;
            }

            // Fetch all tastings for these coffees in parallel
            const tastingPromises = roasteryCoffees.map(c =>
                fetch("/api/tastings?coffee_id=" + c.id).then(r => r.json())
            );
            const allTastings = await Promise.all(tastingPromises);

            list.innerHTML = roasteryCoffees.map((c, idx) => {
                const tastings = allTastings[idx];
                tastings.forEach(t => { tastingsCache[t.id] = t; });
                return `
                <div class="coffee-item" data-id="${c.id}">
                    <div class="name">${esc(c.name || "Unknown coffee")}</div>
                    ${c.country_grown ? `<div class="origin">${esc(c.country_grown)}</div>` : ""}
                    ${c.bean_type ? `<div style="font-size:13px;color:#aaa;margin-top:2px">${esc(c.bean_type)}</div>` : ""}
                    ${c.tasting_notes ? `<div class="tasting-tags">${c.tasting_notes.split(",").map(n => n.trim()).filter(Boolean).map(n => `<span class="tasting-tag" onclick="event.stopPropagation(); filterByNote('${esc(n)}')">${esc(n)}</span>`).join("")}</div>` : ""}
                    ${c.price ? `<div style="font-size:13px;color:#aaa;margin-top:2px">${esc(c.price)}</div>` : ""}
                    <div class="meta">
                        <span>${renderAvgScore(c)}</span>
                        <span>${new Date(c.created_at).toLocaleDateString()}</span>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteCoffee(${c.id})">delete</button>
                    </div>
                    ${c.comments ? `<div style="margin-top:6px;font-size:13px;color:#999;font-style:italic">"${esc(c.comments)}"</div>` : ""}
                    <div class="tasting-history" style="display:block;margin-top:8px">
                        ${tastings.length === 0
                            ? '<div class="tasting-entry" style="color:#666">No tastings yet</div>'
                            : tastings.map(t => `
                                <div class="tasting-entry">
                                    <div class="te-header">
                                        <span>${brewTypeDisplay(t.brew_type)}${t.dosage != null ? " · " + t.dosage.toFixed(1) + "gr" : ""}${t.grind_level != null ? " · grind " + t.grind_level.toFixed(1) : ""}</span>
                                        <span>${new Date(t.created_at).toLocaleDateString()}</span>
                                    </div>
                                    ${t.score != null ? `<div class="te-score">${"★".repeat(t.score)}${"☆".repeat(5 - t.score)}</div>` : ""}
                                    ${t.tasting_notes ? `<div class="tasting-tags" style="margin-top:2px">${t.tasting_notes.split(",").map(n => n.trim()).filter(Boolean).map(n => `<span class="tasting-tag" onclick="event.stopPropagation(); filterByNote('${esc(n)}')">${esc(n)}</span>`).join("")}</div>` : ""}
                                    ${t.comments ? `<div class="te-comments">"${esc(t.comments)}"</div>` : ""}
                                    <button class="delete-btn" style="margin-top:4px" onclick="event.stopPropagation(); editTasting(${t.id}, ${c.id})">edit</button>
                                    <button class="delete-btn" style="margin-top:4px" onclick="event.stopPropagation(); deleteTasting(${t.id}, ${c.id})">delete</button>
                                </div>
                            `).join("")
                        }
                    </div>
                </div>
            `}).join("");

            // Wire coffee card taps to detail panel
            list.querySelectorAll(".coffee-item").forEach(el => {
                el.addEventListener("click", () => {
                    const coffee = coffeeCache.find(c => c.id === parseInt(el.dataset.id));
                    if (coffee) openDetail(coffee);
                });
            });
        }

        $("roastery-back-btn").addEventListener("click", () => {
            activeNoteFilter = null;
            $("filter-bar").style.display = "none";
            currentRoastery = null;
            $("roastery-detail-view").style.display = "none";
            $("home-view").style.display = "block";
        });

        // ── Tasting modal ────────────────────────────────────────────────────

        const BREW_TYPES = {
            espresso:    { emoji: "☕", label: "Espresso" },
            brew:        { emoji: "🫖", label: "Brew" },
            metal_brew:  { emoji: "⚙️", label: "Metal Brew" },
            cappuccino:  { emoji: "🥛", label: "Cappuccino" },
        };

        function brewTypeDisplay(key) {
            const bt = BREW_TYPES[key];
            return bt ? bt.emoji + " " + bt.label : (key || "–");
        }

        const GRIND_DEFAULTS = {
            espresso: 4.0,
            brew: 14.0,
            metal_brew: 18.0,
            cappuccino: 4.0,
        };

        let selectedBrewType = null;
        let selectedTastingScore = null;
        let editingTastingId = null;
        let editingCoffeeId = null;
        let grindManuallyChanged = false;
        let lastCoffeeGrindLevel = null;

        function editTasting(tastingId, coffeeId) {
            const t = tastingsCache[tastingId];
            if (!t) return;
            editingTastingId = tastingId;
            editingCoffeeId = coffeeId;

            // Set coffee selector to the tasting's coffee and disable it
            const sel = $("t-coffee");
            sel.innerHTML = '';
            const coffee = coffeeCache.find(c => c.id === coffeeId);
            const opt = document.createElement("option");
            opt.value = coffeeId;
            opt.textContent = coffee ? (coffee.roaster || "Unknown") + " - " + (coffee.name || "Unknown") : "Coffee #" + coffeeId;
            sel.appendChild(opt);
            sel.value = coffeeId;
            sel.disabled = true;

            // Pre-populate brew type
            selectedBrewType = t.brew_type || null;
            $("t-brew-type-buttons").querySelectorAll("button").forEach(b =>
                b.classList.toggle("active", b.dataset.val === selectedBrewType)
            );

            // Pre-populate dosage
            $("t-dosage").value = t.dosage != null ? t.dosage : "";

            // Pre-populate grind level
            $("t-grind-level").value = t.grind_level != null ? t.grind_level : "";
            grindManuallyChanged = false;
            lastCoffeeGrindLevel = t.grind_level;

            // Pre-populate score
            selectedTastingScore = t.score != null ? t.score : null;
            $("t-score-buttons").querySelectorAll("button").forEach(b =>
                b.classList.toggle("active", selectedTastingScore != null && parseInt(b.dataset.val) <= selectedTastingScore)
            );

            // Pre-populate text fields
            $("t-tasting_notes").value = t.tasting_notes || "";
            $("t-comments").value = t.comments || "";

            // Set modal to edit mode
            $("tasting-modal-title").textContent = "Edit Tasting";
            $("tasting-save-btn").textContent = "Update Tasting";
            $("tasting-modal").classList.add("active");
        }

        // Populate brew type buttons from registry
        (function() {
            const container = $("t-brew-type-buttons");
            Object.entries(BREW_TYPES).forEach(([key, {emoji, label}]) => {
                const btn = document.createElement("button");
                btn.dataset.val = key;
                btn.textContent = emoji + " " + label;
                container.appendChild(btn);
            });
        })();

        // Populate dosage dropdown (10.0 to 20.0 in 0.1 increments)
        (function() {
            const sel = $("t-dosage");
            for (let d = 10.0; d <= 20.0; d = Math.round((d + 0.1) * 10) / 10) {
                const opt = document.createElement("option");
                opt.value = d;
                opt.textContent = d.toFixed(1) + "gr";
                sel.appendChild(opt);
            }
        })();

        // Populate grind level dropdown (3.0 to 22.0 in 0.2 increments)
        (function() {
            const sel = $("t-grind-level");
            for (let g = 3.0; g <= 22.0; g = Math.round((g + 0.2) * 10) / 10) {
                const opt = document.createElement("option");
                opt.value = g;
                opt.textContent = g.toFixed(1);
                sel.appendChild(opt);
            }
        })();

        // Track manual grind level changes
        $("t-grind-level").addEventListener("change", () => {
            grindManuallyChanged = true;
        });

        // Smart grind default: fetch last grind level when coffee is selected
        $("t-coffee").addEventListener("change", async () => {
            const coffeeId = $("t-coffee").value;
            lastCoffeeGrindLevel = null;
            if (coffeeId) {
                const res = await fetch("/api/tastings?coffee_id=" + coffeeId);
                const tastings = await res.json();
                const withGrind = tastings.find(t => t.grind_level != null);
                if (withGrind) {
                    lastCoffeeGrindLevel = withGrind.grind_level;
                    $("t-grind-level").value = withGrind.grind_level;
                    grindManuallyChanged = false;
                    return;
                }
            }
            // No prior grind level — use brew-type default if a brew type is selected
            if (selectedBrewType && GRIND_DEFAULTS[selectedBrewType] != null) {
                $("t-grind-level").value = GRIND_DEFAULTS[selectedBrewType];
            }
            grindManuallyChanged = false;
        });

        $("tasting-btn").addEventListener("click", async () => {
            // Reset edit state
            editingTastingId = null;
            editingCoffeeId = null;
            $("tasting-modal-title").textContent = "Conduct Tasting";
            $("tasting-save-btn").textContent = "Save Tasting";
            // Populate coffee dropdown
            const sel = $("t-coffee");
            sel.disabled = false;
            sel.innerHTML = '<option value="">Select a coffee...</option>';
            const res = await fetch("/api/coffees");
            const coffees = await res.json();
            coffees.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.id;
                opt.textContent = (c.roaster || "Unknown") + " - " + (c.name || "Unknown");
                sel.appendChild(opt);
            });
            // Reset form
            selectedBrewType = null;
            selectedTastingScore = null;
            $("t-brew-type-buttons").querySelectorAll("button").forEach(b => b.classList.remove("active"));
            $("t-score-buttons").querySelectorAll("button").forEach(b => b.classList.remove("active"));
            $("t-dosage").value = "";
            $("t-grind-level").value = "";
            grindManuallyChanged = false;
            lastCoffeeGrindLevel = null;
            $("t-tasting_notes").value = "";
            $("t-comments").value = "";
            $("tasting-modal").classList.add("active");
        });

        $("t-brew-type-buttons").addEventListener("click", (e) => {
            if (e.target.dataset.val) {
                selectedBrewType = e.target.dataset.val;
                $("t-brew-type-buttons").querySelectorAll("button").forEach(b =>
                    b.classList.toggle("active", b.dataset.val === selectedBrewType)
                );
                // Set grind default if user hasn't manually changed it and no prior grind level
                if (!grindManuallyChanged && lastCoffeeGrindLevel == null && GRIND_DEFAULTS[selectedBrewType] != null) {
                    $("t-grind-level").value = GRIND_DEFAULTS[selectedBrewType];
                }
            }
        });

        $("t-score-buttons").addEventListener("click", (e) => {
            if (e.target.dataset.val) {
                selectedTastingScore = parseInt(e.target.dataset.val);
                $("t-score-buttons").querySelectorAll("button").forEach(b =>
                    b.classList.toggle("active", parseInt(b.dataset.val) <= selectedTastingScore)
                );
            }
        });

        $("tasting-cancel-btn").addEventListener("click", () => {
            $("tasting-modal").classList.remove("active");
        });

        $("tasting-save-btn").addEventListener("click", async () => {
            const coffeeId = $("t-coffee").value;
            if (!coffeeId) { alert("Please select a coffee"); return; }
            const dosageVal = $("t-dosage").value;
            const grindVal = $("t-grind-level").value;
            const tasting = {
                coffee_id: parseInt(coffeeId),
                brew_type: selectedBrewType,
                dosage: dosageVal ? parseFloat(dosageVal) : null,
                grind_level: grindVal ? parseFloat(grindVal) : null,
                score: selectedTastingScore,
                tasting_notes: $("t-tasting_notes").value || null,
                comments: $("t-comments").value || null,
            };
            const url = editingTastingId
                ? "/api/tastings/" + editingTastingId
                : "/api/tastings";
            const method = editingTastingId ? "PUT" : "POST";
            const res = await fetch(url, {
                method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(tasting),
            });
            if (res.ok) {
                $("tasting-modal").classList.remove("active");
                editingTastingId = null;
                editingCoffeeId = null;
                if (currentRoastery) {
                    openRoastery(currentRoastery);
                } else {
                    loadHomeScreen();
                }
            } else {
                const err = await res.json();
                alert("Error: " + (err.error || "Save failed"));
            }
        });

        // ── Tasting history ─────────────────────────────────────────────────

        let tastingsCache = {};

        async function toggleTastingHistory(btn, coffeeId) {
            const container = $("tastings-" + coffeeId);
            if (container.style.display !== "none") {
                container.style.display = "none";
                btn.textContent = "Show tastings";
                return;
            }
            const res = await fetch("/api/tastings?coffee_id=" + coffeeId);
            const tastings = await res.json();
            tastings.forEach(t => { tastingsCache[t.id] = t; });
            if (tastings.length === 0) {
                container.innerHTML = '<div class="tasting-entry" style="color:#666">No tastings yet</div>';
            } else {
                container.innerHTML = tastings.map(t => `
                    <div class="tasting-entry">
                        <div class="te-header">
                            <span>${brewTypeDisplay(t.brew_type)}${t.dosage != null ? " · " + t.dosage.toFixed(1) + "gr" : ""}${t.grind_level != null ? " · grind " + t.grind_level.toFixed(1) : ""}</span>
                            <span>${new Date(t.created_at).toLocaleDateString()}</span>
                        </div>
                        ${t.score != null ? `<div class="te-score">${"★".repeat(t.score)}${"☆".repeat(5 - t.score)}</div>` : ""}
                        ${t.tasting_notes ? `<div class="tasting-tags" style="margin-top:2px">${t.tasting_notes.split(",").map(n => n.trim()).filter(Boolean).map(n => `<span class="tasting-tag" onclick="event.stopPropagation(); filterByNote('${esc(n)}')">${esc(n)}</span>`).join("")}</div>` : ""}
                        ${t.comments ? `<div class="te-comments">"${esc(t.comments)}"</div>` : ""}
                        <button class="delete-btn" style="margin-top:4px" onclick="editTasting(${t.id}, ${coffeeId})">edit</button>
                        <button class="delete-btn" style="margin-top:4px" onclick="deleteTasting(${t.id}, ${coffeeId})">delete</button>
                    </div>
                `).join("");
            }
            container.style.display = "block";
            btn.textContent = "Hide tastings";
        }

        async function deleteTasting(tastingId, coffeeId) {
            if (!confirm("Delete this tasting?")) return;
            await fetch("/api/tastings/" + tastingId, { method: "DELETE" });
            if (currentRoastery) {
                openRoastery(currentRoastery);
            } else {
                loadHomeScreen();
            }
        }

        function esc(s) {
            const d = document.createElement("div");
            d.textContent = s;
            return d.innerHTML;
        }

        // ── Roaster autocomplete ─────────────────────────────────────────────

        let roasterCache = [];

        async function loadRoasters() {
            try {
                const res = await fetch("/api/roasters");
                roasterCache = await res.json();
            } catch (e) { /* ignore */ }
        }

        function roasterNames() {
            return roasterCache.map(r => typeof r === "string" ? r : r.roaster);
        }

        function setupAutocomplete(inputId, dropdownId) {
            const input = $(inputId);
            const dropdown = $(dropdownId);
            let highlightIdx = -1;

            function render(items) {
                if (items.length === 0) { dropdown.style.display = "none"; return; }
                dropdown.innerHTML = items.map((r, i) =>
                    `<div class="autocomplete-item${i === highlightIdx ? ' highlighted' : ''}">${esc(r)}</div>`
                ).join("");
                dropdown.style.display = "block";
            }

            function getMatches() {
                const q = input.value.trim().toLowerCase();
                if (!q) return [];
                return roasterNames().filter(r => r.toLowerCase().startsWith(q));
            }

            input.addEventListener("input", () => {
                highlightIdx = -1;
                render(getMatches());
            });

            input.addEventListener("keydown", (e) => {
                const items = dropdown.querySelectorAll(".autocomplete-item");
                if (!items.length) return;
                if (e.key === "ArrowDown") {
                    e.preventDefault();
                    highlightIdx = Math.min(highlightIdx + 1, items.length - 1);
                    render(getMatches());
                } else if (e.key === "ArrowUp") {
                    e.preventDefault();
                    highlightIdx = Math.max(highlightIdx - 1, 0);
                    render(getMatches());
                } else if (e.key === "Enter" && highlightIdx >= 0) {
                    e.preventDefault();
                    input.value = items[highlightIdx].textContent;
                    dropdown.style.display = "none";
                } else if (e.key === "Escape") {
                    dropdown.style.display = "none";
                }
            });

            dropdown.addEventListener("mousedown", (e) => {
                const item = e.target.closest(".autocomplete-item");
                if (item) {
                    e.preventDefault();
                    input.value = item.textContent;
                    dropdown.style.display = "none";
                }
            });

            input.addEventListener("blur", () => {
                setTimeout(() => { dropdown.style.display = "none"; }, 150);
            });
        }

        setupAutocomplete("f-roaster", "f-roaster-dropdown");
        setupAutocomplete("d-roaster", "d-roaster-dropdown");

        // ── Roastery lookup ───────────────────────────────────────────────────

        function updateLookupButton() {
            const roaster = $("f-roaster").value.trim();
            $("f-lookup-btn").style.display = roaster ? "block" : "none";
        }

        $("f-roaster").addEventListener("input", updateLookupButton);
        $("f-roaster").addEventListener("change", updateLookupButton);
        $("f-roaster").addEventListener("blur", () => {
            setTimeout(updateLookupButton, 200);
        });

        $("f-lookup-btn").addEventListener("click", async () => {
            const roaster = $("f-roaster").value.trim();
            const coffeeName = $("f-name").value.trim();
            if (!roaster || !coffeeName) {
                alert("Enter both roaster and coffee name first");
                return;
            }
            const btn = $("f-lookup-btn");
            const sourceEl = $("lookup-source");
            const origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Looking up...";
            sourceEl.style.display = "none";
            try {
                const res = await fetch("/api/lookup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ roaster, coffee_name: coffeeName }),
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || "Lookup failed");
                    return;
                }
                // Fill empty fields only
                const fieldMap = {
                    name: "f-name", country_grown: "f-country_grown", country_roasted: "f-country_roasted",
                    bean_type: "f-bean_type", process: "f-process", roast_level: "f-roast_level",
                    tasting_notes: "f-tasting_notes", weight: "f-weight", price: "f-price",
                };
                for (const [key, id] of Object.entries(fieldMap)) {
                    if (data[key] && !$(id).value) {
                        $(id).value = data[key];
                    }
                }
                // Show source indication
                if (data.source === "baristashopen") {
                    sourceEl.textContent = "Found on Baristashopen.se";
                    sourceEl.style.display = "block";
                } else {
                    sourceEl.textContent = "";
                    sourceEl.style.display = "none";
                }
            } catch (err) {
                alert("Lookup error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = origText;
            }
        });

        loadHomeScreen();
        loadRoasters();
    </script>
</body>
</html>
